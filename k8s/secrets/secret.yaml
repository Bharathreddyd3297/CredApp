# =====================================================================
# CredPay database credentials  ***TEMPORARY / PLACEHOLDER***
# =====================================================================
# This plain Secret is a STOP-GAP so the app can run before Key Vault is
# wired in. In production, DELETE this file and mount the password from
# Azure Key Vault using the Secrets Store CSI driver + Workload Identity
# (the AKS addon and identity are already provisioned by Terraform).
#
# Do NOT commit a real password. Create it out-of-band instead, e.g.:
#
#   kubectl create secret generic credpay-db \
#     --namespace credpay \
#     --from-literal=DB_PASSWORD="$(terraform output -raw postgres_admin_password)" \
#     --from-literal=SPRING_DATASOURCE_PASSWORD="$(terraform output -raw postgres_admin_password)"
#
# The manifest below is illustrative only (stringData, not real).
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: credpay-db
  namespace: credpay
  labels:
    app.kubernetes.io/part-of: credpay
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_ME"              # consumed by payment-service (FastAPI)
  SPRING_DATASOURCE_PASSWORD: "REPLACE_ME" # consumed by user-service (Spring Boot)
