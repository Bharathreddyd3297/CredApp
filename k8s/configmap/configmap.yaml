# =====================================================================
# CredPay non-secret configuration
# =====================================================================
# Only NON-sensitive values live here. The DB password lives in a Secret
# (k8s/secrets/) and will later come from Key Vault via the CSI driver.
#
# Replace <POSTGRES_FQDN> with:  terraform output -raw postgres_fqdn
# (e.g. psql-credpay-dev.private.postgres.database.azure.com)
# =====================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: credpay-config
  namespace: credpay
  labels:
    app.kubernetes.io/part-of: credpay
data:
  # ---- Shared DB coordinates (consumed by both backends) ----
  DB_HOST: "<POSTGRES_FQDN>"
  DB_PORT: "5432"
  DB_NAME: "credpay"
  DB_USERNAME: "credpayadmin"

  # ---- User Service (Spring Boot) ----
  # Spring relaxed-binding: SPRING_DATASOURCE_URL overrides the property in
  # application.properties. sslmode=require enforces TLS to Azure PostgreSQL.
  SPRING_DATASOURCE_URL: "jdbc:postgresql://<POSTGRES_FQDN>:5432/credpay?sslmode=require"
  SPRING_DATASOURCE_USERNAME: "credpayadmin"
  # Cap the JVM heap to the container memory limit.
  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
