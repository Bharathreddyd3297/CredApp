# =====================================================================
# Frontend Service - ClusterIP (exposed externally via the Ingress)
# =====================================================================
# Blue/Green: `version` picks which color (frontend-blue / frontend-green)
# receives live traffic. "blue" below is only the bootstrap default for a
# brand new cluster. After that, the pipeline flips it with
# `kubectl patch svc frontend ... -p '{"spec":{"selector":{"version":"..."}}}'`
# once the new color passes its smoke test - re-applying this file is safe
# and will NOT revert the patch, because `kubectl apply` only overwrites a
# field when this file's own value for it has actually changed.
# =====================================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: credpay
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: credpay
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
    version: blue
  ports:
    - name: http
      port: 80
      targetPort: http
