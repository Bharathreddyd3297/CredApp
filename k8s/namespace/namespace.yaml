# =====================================================================
# CredPay namespace + workload-identity ServiceAccount
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: credpay
  labels:
    app.kubernetes.io/part-of: credpay
    # "baseline" is enforced because the frontend's nginx:stable-alpine image
    # binds :80 as root. Migrate the frontend to nginxinc/nginx-unprivileged
    # (listens on 8080, non-root) to raise this to "restricted".
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
# ServiceAccount federated to the Azure user-assigned identity created by
# Terraform (module.identities). Annotate with the identity's client_id and
# label it so the AKS Workload Identity webhook injects a token.
# Replace <WORKLOAD_IDENTITY_CLIENT_ID> with:
#   terraform output -raw workload_identity_client_id
apiVersion: v1
kind: ServiceAccount
metadata:
  name: credpay-workload-sa
  namespace: credpay
  labels:
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: "<WORKLOAD_IDENTITY_CLIENT_ID>"
